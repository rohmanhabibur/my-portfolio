<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans antialiased">

    <!-- Form Login Sederhana -->
    <div id="login-section" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md border border-slate-200">
            <h2 class="text-2xl font-bold text-slate-900 text-center mb-6">Admin Login</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Password Akses</label>
                    <input type="password" id="admin-password" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Masukkan password...">
                </div>
                <button onclick="verifikasiLogin()" class="w-full bg-blue-600 text-white font-bold py-2.5 rounded-lg hover:bg-blue-700 transition">Masuk Dasbor</button>
            </div>
        </div>
    </div>

    <!-- Dasbor Admin (Tersembunyi Sebelum Login) -->
    <div id="dashboard-section" class="hidden min-h-screen p-8">
        <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-md border border-slate-200">
            <div class="flex justify-between items-center mb-8 pb-4 border-b border-slate-100">
                <h1 class="text-2xl font-bold text-slate-900">Manajemen Data Proyek (Input ke G-Sheet)</h1>
                <button onclick="logout()" class="text-sm bg-rose-50 text-rose-600 px-3 py-1.5 rounded-md font-medium border border-rose-100 hover:bg-rose-100">Keluar</button>
            </div>

            <!-- Form Input Data Proyek -->
            <form id="project-form" class="space-y-6" onsubmit="kirimDataKeGSheet(event)">
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Nama Proyek</label>
                        <input type="text" id="project-name" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Kategori Tech</label>
                        <input type="text" id="project-tech" placeholder="Contoh: Laravel, Apps Script" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Deskripsi Proyek</label>
                    <textarea id="project-desc" rows="4" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required></textarea>
                </div>
                <button type="submit" class="bg-blue-600 text-white font-bold px-6 py-2.5 rounded-lg hover:bg-blue-700 transition">Simpan Proyek ke Google Sheets</button>
            </form>
        </div>
    </div>

    <script>
        // MASUKKAN URL DEPLOY DARI GOOGLE APPS SCRIPT DI SINI NANTI
        const API_URL = "URL_WEB_APP_APPS_SCRIPT_ANDA"; 

        function verifikasiLogin() {
            const pass = document.getElementById('admin-password').value;
            // Ganti 'admin123' dengan password rahasia pilihan Mas sendiri
            if (pass === 'admin123') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
            } else {
                alert('Password salah!');
            }
        }

        function logout() {
            document.getElementById('admin-password').value = '';
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('dashboard-section').classList.add('hidden');
        }

        function kirimDataKeGSheet(event) {
            event.preventDefault();
            
            const data = {
                nama: document.getElementById('project-name').value,
                tech: document.getElementById('project-tech').value,
                deskripsi: document.getElementById('project-desc').value
            };

            // Mengirim data menggunakan FETCH API ke jembatan Google Apps Script
            fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors', // Penting untuk bypass CORS Apps Script Web App
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(() => {
                alert('Data berhasil disinkronkan ke Google Sheets!');
                document.getElementById('project-form').reset();
            })
            .catch(err => alert('Gagal mengirim data: ' + err));
        }
    </script>
</body>
</html>
